_schema-version: 3.3.0
ID: demoprog
description: A simple CAP project.
version: 1.0.0
modules:
- name: demoprog-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: demoprog-db
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: demoprog-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: demoprog-db
  parameters:
    buildpack: nodejs_buildpack
- name: demoprog-destination-content
  type: com.sap.application.content
  requires:
  - name: demoprog-destination-service
    parameters:
      content-target: true
  - name: demoprog_html_repo_host
    parameters:
      service-key:
        name: demoprog_html_repo_host-key
  - name: uaa_demoprog
    parameters:
      service-key:
        name: uaa_demoprog-key
  parameters:
    content:
      instance:
        destinations:
        - Name: demoprogram_demoprog_html_repo_host
          ServiceInstanceName: demoprog-html5-app-host-service
          ServiceKeyName: demoprog_html_repo_host-key
          sap.cloud.service: demoprogram
        - Authentication: OAuth2UserTokenExchange
          Name: demoprogram_uaa_demoprog
          ServiceInstanceName: demoprog-xsuaa-service
          ServiceKeyName: uaa_demoprog-key
          sap.cloud.service: demoprogram
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: demoprog-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: demoprog_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - project1.zip
      name: project1
      target-path: resources/
- name: project1
  type: html5
  path: app/project1
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: demoprog-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: demoprog-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: demoprog-destination-service
    service-plan: lite
- name: demoprog_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: demoprog-html5-app-host-service
    service-plan: app-host
- name: uaa_demoprog
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: demoprog-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
