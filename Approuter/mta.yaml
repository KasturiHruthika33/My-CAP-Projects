_schema-version: '3.3.0'
ID: My-CAP-Projects
version: 1.0.0
description: "A simple CAP project."

modules:
  - name: Approuter-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: Approuter-auth
      - name: Approuter-db
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    build-parameters:
      builder: npm-ci

  - name: Approuter
    type: approuter.nodejs
    path: Approuter
    requires:
      - name: Approuter-auth
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ${srv-url}
          forwardauthtoken: true
    parameters:
      disk-quota: 256M
      memory: 256M

resources:
  - name: Approuter-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: Approuter-${org}-${space}
        tenant-mode: dedicated

  - name: Approuter-db
    type: com.sap.xs.hdi-container
    parameters:
      service: service-manager
      service-plan: container